name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: TypeScript compile
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Package VS Code extension
        run: npx vsce package --no-dependencies 2>/dev/null || echo "vsce not installed, skipping"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localforge-vsix-${{ matrix.node-version }}
          path: "*.vsix"
          if-no-files-found: ignore

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
        with:
          static_site_generator: html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
