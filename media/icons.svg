<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60">
  <!-- Chat icon -->
  <g transform="translate(10,5)">
    <rect x="0" y="0" width="40" height="30" rx="6" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <path d="M8 22 L14 30 L20 22" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="12" y1="10" x2="28" y2="10" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="12" y1="16" x2="24" y2="16" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="20" y="50" text-anchor="middle" fill="#e6edf3" font-size="10" font-family="sans-serif">Chat</text>
  </g>
  <!-- Agent icon -->
  <g transform="translate(85,5)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#3fb950" stroke-width="2"/>
    <circle cx="20" cy="15" r="4" fill="#3fb950"/>
    <circle cx="10" cy="8" r="2" fill="#3fb950" opacity="0.5"/>
    <circle cx="30" cy="8" r="2" fill="#3fb950" opacity="0.5"/>
    <circle cx="10" cy="22" r="2" fill="#3fb950" opacity="0.5"/>
    <circle cx="30" cy="22" r="2" fill="#3fb950" opacity="0.5"/>
    <text x="20" y="50" text-anchor="middle" fill="#e6edf3" font-size="10" font-family="sans-serif">Agent</text>
  </g>
  <!-- Plan icon -->
  <g transform="translate(160,5)">
    <rect x="4" y="4" width="32" height="24" rx="3" fill="none" stroke="#d29922" stroke-width="2"/>
    <line x1="10" y1="12" x2="30" y2="12" stroke="#d29922" stroke-width="1.5"/>
    <line x1="10" y1="18" x2="26" y2="18" stroke="#d29922" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#d29922"/>
    <text x="20" y="50" text-anchor="middle" fill="#e6edf3" font-size="10" font-family="sans-serif">Plan</text>
  </g>
  <!-- Build/Workflow icon -->
  <g transform="translate(235,5)">
    <rect x="4" y="4" width="32" height="24" rx="3" fill="none" stroke="#bc8cff" stroke-width="2"/>
    <polyline points="8,20 16,10 24,18 32,8" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
    <circle cx="8" cy="20" r="2" fill="#bc8cff"/>
    <circle cx="32" cy="8" r="2" fill="#bc8cff"/>
    <text x="20" y="50" text-anchor="middle" fill="#e6edf3" font-size="10" font-family="sans-serif">Build</text>
  </g>
</svg>
